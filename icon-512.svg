<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a5240"/>
      <stop offset="100%" style="stop-color:#353d2c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="18" y="18" width="476" height="476" rx="94" fill="none" stroke="#f0ede8" stroke-width="2" opacity="0.12"/>

  <!-- Training -->
  <text x="256" y="224"
        text-anchor="middle"
        font-family="'DM Serif Display', Georgia, serif"
        font-size="72"
        font-style="italic"
        fill="#f0ede8"
        opacity="0.95"
        letter-spacing="-1">Training</text>

  <!-- Divider line -->
  <line x1="96" y1="252" x2="416" y2="252" stroke="#f0ede8" stroke-width="1.5" opacity="0.25"/>

  <!-- LOG -->
  <text x="256" y="330"
        text-anchor="middle"
        font-family="'DM Mono', 'Courier New', monospace"
        font-size="60"
        font-weight="300"
        fill="#f0ede8"
        opacity="0.75"
        letter-spacing="18">LOG</text>
</svg>
